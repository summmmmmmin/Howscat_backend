spring.application.name=howscat

# 아래 파일이 있으면(로컬 개발용) 덮어씌웁니다.
# 예: springserver/src/main/resources/application-local.properties
spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/howscat?serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jmx.enabled=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.username=${REDIS_USERNAME:default}
jwt.secret=${JWT_SECRET}

# Kakao Local API (환경변수 KAKAO_REST_API_KEY로 주입)
kakao.rest.api.key=${KAKAO_REST_API_KEY:}
# 요청 사이즈 제한
server.port=${PORT:8080}
server.tomcat.max-http-form-post-size=10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 로그 레벨 (Railway 로그 초과 방지)
logging.level.root=WARN
logging.level.com.example.howscat=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
